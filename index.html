<style>
  :root{
    --navy-deep: #0f1f27;
    --navy: #16303d;
    --navy-soft: #1c3a49;
    --cream: #faf6ec;
    --card: #ffffff;
    --brass: #c19a49;
    --brass-dark: #9c7a34;
    --brass-light: #e3c780;
    --ink: #1b2a2f;
    --muted: #7c8b8f;
    --muted-light: #a9b6b8;
    --rust: #c85a3a;
    --rust-bg: #f7e2d6;
    --sage: #4f7a5c;
    --sage-bg: #e1ebe0;
    --line: #e6e0cd;
    --shadow: 0 12px 32px rgba(15,31,39,0.35);
  }
  *{box-sizing:border-box; -webkit-tap-highlight-color: transparent;}
  html{
    background: var(--navy-deep);
    overscroll-behavior-y: contain;
  }
  body{
    margin:0;
    min-height:100vh;
    background: radial-gradient(ellipse at top, #1a3644 0%, var(--navy-deep) 60%);
    font-family: 'Inter', sans-serif;
    color: var(--ink);
    padding: calc(20px + env(safe-area-inset-top)) 14px calc(40px + env(safe-area-inset-bottom));
    overscroll-behavior-y: contain;
    -webkit-user-select: none;
    user-select: none;
  }
  input, textarea{ -webkit-user-select: text; user-select: text; }

  .app{
    max-width: 460px;
    margin: 0 auto;
    position: relative;
  }

  /* Ring binding */
  .rings{
    display:flex;
    justify-content: space-evenly;
    padding: 0 28px;
    position: relative;
    z-index: 2;
    margin-bottom: -14px;
  }
  .rings span{
    width: 16px;
    height: 26px;
    border-radius: 8px;
    background: linear-gradient(180deg, var(--brass-light), var(--brass) 55%, var(--brass-dark));
    box-shadow: inset 0 0 0 2px rgba(255,255,255,0.15), 0 3px 6px rgba(0,0,0,0.35);
  }

  .ledger{
    background: var(--cream);
    border-radius: 18px;
    box-shadow: var(--shadow);
    overflow: hidden;
    padding-top: 22px;
  }

  header{
    padding: 4px 22px 16px;
    border-bottom: 1px solid var(--line);
  }
  .brand-row{
    display:flex;
    justify-content: space-between;
    align-items: baseline;
    gap: 8px;
  }
  .brand{
    font-family: 'Fraunces', serif;
    font-weight: 600;
    font-size: 26px;
    letter-spacing: -0.3px;
    color: var(--navy);
  }
  .user-tag{
    font-size: 11px;
    color: var(--muted);
    text-align:right;
    white-space: nowrap;
  }
  .user-tag #userLabel{ color: var(--navy); font-weight:600; }
  .user-tag a{
    color: var(--brass-dark);
    text-decoration: none;
    font-weight: 600;
  }

  .nav{
    display:flex;
    align-items:center;
    justify-content:center;
    gap: 18px;
    margin-top: 12px;
  }
  .nav button{
    background: var(--navy);
    color: var(--cream);
    border:none;
    width: 30px;
    height: 30px;
    border-radius: 50%;
    font-size: 15px;
    cursor:pointer;
    display:flex;
    align-items:center;
    justify-content:center;
    transition: background 0.15s;
  }
  .nav button:hover{ background: var(--brass-dark); }
  .nav .month-label{
    font-family: 'Fraunces', serif;
    font-size: 17px;
    font-weight: 500;
    text-transform: uppercase;
    letter-spacing: 1.5px;
    color: var(--navy);
    min-width: 170px;
    text-align:center;
  }

  .summary{
    display:flex;
    padding: 16px 22px;
    gap: 10px;
    border-bottom: 1px solid var(--line);
  }
  .stat{
    flex:1;
    text-align:center;
  }
  .stat .num{
    font-family: 'IBM Plex Mono', monospace;
    font-size: 17px;
    font-weight: 600;
    color: var(--navy);
  }
  .stat .label{
    font-size: 9px;
    text-transform: uppercase;
    letter-spacing: 1px;
    color: var(--muted);
    margin-top: 3px;
  }
  .stat.due .num{ color: var(--rust); }
  .stat.paid .num{ color: var(--sage); }
  .stat + .stat{ border-left: 1px solid var(--line); }

  .cal-body{ padding: 14px 14px 20px; }

  .grid{
    display:grid;
    grid-template-columns: repeat(7, 1fr);
    gap: 4px;
  }
  .dow{
    font-size: 9px;
    font-weight: 600;
    text-transform: uppercase;
    letter-spacing: 0.5px;
    color: var(--muted-light);
    text-align:center;
    padding-bottom: 6px;
  }
  .day{
    background: var(--card);
    border-radius: 9px;
    border: 1px solid var(--line);
    min-height: 88px;
    padding: 6px 5px;
    cursor: pointer;
    position: relative;
    display:flex;
    flex-direction:column;
    transition: transform 0.1s, box-shadow 0.1s;
  }
  .day:active{ transform: scale(0.96); }
  .day.empty{ background:transparent; border:none; cursor:default; }
  .day .num{
    font-family: 'IBM Plex Mono', monospace;
    font-size: 11px;
    font-weight: 600;
    color: var(--navy);
    align-self:flex-start;
  }
  .day.today{
    border: 1.5px solid var(--brass);
    box-shadow: 0 0 0 2px rgba(193,154,73,0.18);
  }
  .day.today .num{ color: var(--brass-dark); }
  .day.has-bills{ border-color: var(--muted-light); }

  .dots{
    display:flex;
    gap: 3px;
    margin-top: auto;
    flex-wrap: wrap;
  }
  .dot{
    width: 6px;
    height: 6px;
    border-radius: 50%;
    background: var(--rust);
    flex-shrink: 0;
  }
  .dot.paid{ background: var(--sage); }

  .day-amt{
    font-family: 'IBM Plex Mono', monospace;
    font-size: 10px;
    font-weight: 600;
    color: var(--navy);
    margin-top: 2px;
  }

  .bill-names{
    display:flex;
    flex-direction: column;
    gap: 2px;
    margin-top: 3px;
    overflow: hidden;
  }
  .bill-name-tag{
    font-size: 9.5px;
    line-height: 1.25;
    color: var(--ink);
    white-space: nowrap;
    overflow: hidden;
    text-overflow: ellipsis;
    display:flex;
    align-items:center;
    gap: 3px;
  }
  .bill-name-tag.paid{ color: var(--muted); text-decoration: line-through; }
  .bill-name-tag .dot{ margin-top: 0; }
  .bill-more{
    font-size: 9px;
    color: var(--muted-light);
    font-style: italic;
  }

  .footer-note{
    text-align:center;
    font-size: 11px;
    color: var(--muted-light);
    margin-top: 16px;
    padding: 0 20px;
  }

  /* Bottom sheet overlay */
  .overlay{
    position:fixed; inset:0;
    background: rgba(15,31,39,0.6);
    display:none;
    align-items:flex-end;
    justify-content:center;
    z-index: 50;
  }
  .overlay.open{ display:flex; }
  .overlay.center{ align-items:center; padding: 16px; }
  .sheet{
    background: var(--cream);
    width:100%;
    max-width: 460px;
    max-height: 88vh;
    overflow-y:auto;
    border-radius: 20px 20px 0 0;
    padding: 10px 22px calc(24px + env(safe-area-inset-bottom));
    animation: slideUp 0.22s ease-out;
  }
  .overlay.center .sheet{
    border-radius: 18px;
    animation: popIn 0.18s ease-out;
  }
  @keyframes slideUp{ from{ transform: translateY(24px); opacity:0.6; } to{ transform: translateY(0); opacity:1; } }
  @keyframes popIn{ from{ transform: scale(0.95); opacity:0.6; } to{ transform: scale(1); opacity:1; } }

  .handle{
    width: 40px; height: 4px;
    background: var(--line);
    border-radius: 2px;
    margin: 8px auto 12px;
  }

  .sheet h2{
    margin:0 0 2px;
    font-family: 'Fraunces', serif;
    font-size: 22px;
    font-weight: 600;
    color: var(--navy);
  }
  .sheet .sub{
    font-size: 11px;
    color: var(--muted);
    text-transform: uppercase;
    letter-spacing: 1px;
    margin-bottom: 14px;
  }

  .bill-row{
    border-top: 1px solid var(--line);
    padding: 12px 0;
    display:flex;
    align-items:center;
    gap: 10px;
  }
  .check{
    width: 22px; height: 22px;
    border-radius: 50%;
    border: 1.5px solid var(--muted-light);
    flex-shrink:0;
    cursor:pointer;
    display:flex;
    align-items:center;
    justify-content:center;
    background: var(--card);
    transition: all 0.15s;
  }
  .check.checked{
    background: var(--sage);
    border-color: var(--sage);
    color: white;
    font-size: 12px;
  }
  .bill-row .info{ flex:1; min-width:0; }
  .bill-row .name{ font-weight:600; font-size:14px; color: var(--navy); }
  .bill-row .name.paid{ color: var(--muted); text-decoration: line-through; }
  .bill-row .amt{ font-family:'IBM Plex Mono', monospace; font-size:12px; color: var(--muted); margin-top:1px; }
  .bill-row .del{
    background:none; border:none; color:var(--rust);
    font-size: 18px; cursor:pointer; padding:2px 6px; opacity:0.6;
  }
  .bill-row .del:hover{ opacity:1; }

  .add-form{ margin-top: 8px; padding-top: 14px; border-top: 1px solid var(--line); }
  .add-form label{
    display:block;
    font-size: 10px;
    text-transform:uppercase;
    letter-spacing: 1px;
    color: var(--muted);
    margin-bottom: 4px;
    margin-top: 12px;
  }
  .add-form input{
    width:100%;
    font-family: 'Inter', sans-serif;
    font-size: 16px;
    padding: 10px 12px;
    border: 1.5px solid var(--line);
    border-radius: 10px;
    background: var(--card);
    color: var(--ink);
  }
  .add-form input:focus{ outline:none; border-color: var(--brass); }

  .modal-actions{ display:flex; gap: 8px; margin-top: 18px; }
  .btn{
    font-family: 'Inter', sans-serif;
    font-size: 13px;
    font-weight: 600;
    padding: 12px 14px;
    border-radius: 10px;
    border: none;
    cursor: pointer;
    flex:1;
  }
  .btn-primary{ background: var(--navy); color: var(--cream); }
  .btn-primary:hover{ background: var(--brass-dark); }
  .btn-ghost{ background:none; border:1.5px solid var(--line); color: var(--navy); }
  .btn-ghost:hover{ border-color: var(--navy); }
  .empty-msg{ font-size:12px; color:var(--muted); padding: 12px 0; }

  @media (min-width: 480px){
    body{ padding-top: 40px; }
  }
</style>
</head>
<body>
<div class="app">

  <div class="rings">
    <span></span><span></span><span></span><span></span><span></span>
    <span></span><span></span><span></span>
  </div>

  <div class="ledger">
    <header>
      <div class="brand-row">
        <div class="brand">Mis Billes</div>
        <div class="user-tag"><span id="userLabel">—</span><br><a href="#" id="switchUserLink">cambiar</a></div>
      </div>
      <div class="nav">
        <button id="prevBtn" aria-label="Mes anterior">‹</button>
        <div class="month-label" id="monthLabel"></div>
        <button id="nextBtn" aria-label="Mes siguiente">›</button>
      </div>
    </header>

    <div class="summary">
      <div class="stat">
        <div class="num" id="totalCount">0</div>
        <div class="label">Billes</div>
      </div>
      <div class="stat due">
        <div class="num" id="totalDue">$0</div>
        <div class="label">Por pagar</div>
      </div>
      <div class="stat paid">
        <div class="num" id="totalPaid">$0</div>
        <div class="label">Pagado</div>
      </div>
    </div>

    <div class="cal-body">
      <div class="grid" id="dowRow"></div>
      <div class="grid" id="calGrid" style="margin-top:4px;"></div>
    </div>
  </div>

  <div class="footer-note">Toca un día para agregar o revisar tus billes. Se guardan en la nube bajo tu nombre.</div>
</div>

<div class="overlay center open" id="userOverlay">
  <div class="sheet" style="border-radius:18px;">
    <h2>Bienvenido</h2>
    <div class="sub">Escribe tu nombre para guardar tus billes en la nube</div>
    <div class="add-form" style="margin-top:0; border-top:none; padding-top:0;">
      <label for="userNameInput">Tu nombre</label>
      <input type="text" id="userNameInput" placeholder="Ej. Ramon, Tamara...">
    </div>
    <div class="modal-actions">
      <button class="btn btn-primary" id="userNameBtn" style="flex:1;">Entrar</button>
    </div>
    <div class="footer-note" style="margin-top:14px; padding:0;">Cada nombre tiene su propio calendario, separado de los demás.</div>
  </div>
</div>

<div class="overlay" id="overlay">
  <div class="sheet">
    <div class="handle"></div>
    <h2 id="modalDate">—</h2>
    <div class="sub" id="modalYear">—</div>

    <div id="billList"></div>

    <div class="add-form">
      <label for="billName">Nombre del bille</label>
      <input type="text" id="billName" placeholder="Ej. Luz, Internet, Renta...">
      <label for="billAmt">Monto (opcional)</label>
      <input type="text" id="billAmt" placeholder="Ej. 85.50" inputmode="decimal">
    </div>

    <div class="modal-actions">
      <button class="btn btn-ghost" id="closeBtn">Cerrar</button>
      <button class="btn btn-primary" id="addBtn">Agregar bille</button>
    </div>
  </div>
</div>

<script type="module">
import { initializeApp } from "https://www.gstatic.com/firebasejs/10.13.0/firebase-app.js";
import { getFirestore, doc, getDoc, setDoc, serverTimestamp } from "https://www.gstatic.com/firebasejs/10.13.0/firebase-firestore.js";

const firebaseConfig = {
  apiKey: "AIzaSyASAw_tPdyxm6_uxJIIT8MIQrznDzCV_fA",
  authDomain: "mis-billes-app.firebaseapp.com",
  projectId: "mis-billes-app",
  storageBucket: "mis-billes-app.firebasestorage.app",
  messagingSenderId: "431022054039",
  appId: "1:431022054039:web:40852ccf10efe925fe27d2"
};

const fbApp = initializeApp(firebaseConfig);
const db = getFirestore(fbApp);

const monthNames = ["Enero","Febrero","Marzo","Abril","Mayo","Junio","Julio","Agosto","Septiembre","Octubre","Noviembre","Diciembre"];
const dowNames = ["Dom","Lun","Mar","Mié","Jue","Vie","Sáb"];

const today = new Date();
let viewYear = today.getFullYear();
let viewMonth = today.getMonth();
let selectedKey = null;

let billsData = {};
let storageReady = false;

const USERNAME_LS_KEY = 'bills-app-username';
let currentUserKey = null;
let currentUserDisplay = null;

function sanitizeKey(name){
  return name.trim().toLowerCase().replace(/[^a-z0-9áéíóúñ]+/gi, '-').replace(/^-+|-+$/g, '');
}

async function loadData(){
  try{
    const ref = doc(db, 'billUsers', currentUserKey);
    const snap = await getDoc(ref);
    if(snap.exists() && snap.data().data){
      billsData = JSON.parse(snap.data().data);
    } else {
      billsData = {};
    }
  }catch(e){
    console.error('No se pudo cargar', e);
    billsData = {};
  }
  storageReady = true;
  render();
}

async function saveData(){
  try{
    const ref = doc(db, 'billUsers', currentUserKey);
    await setDoc(ref, {
      name: currentUserDisplay,
      data: JSON.stringify(billsData),
      updatedAt: serverTimestamp()
    }, { merge: true });
  }catch(e){
    console.error('No se pudo guardar', e);
  }
}

function dayKey(y,m,d){ return `${y}-${m}-${d}`; }

function render(){
  document.getElementById('monthLabel').textContent = `${monthNames[viewMonth]} ${viewYear}`;

  const dowRow = document.getElementById('dowRow');
  dowRow.innerHTML = dowNames.map(d => `<div class="dow">${d}</div>`).join('');

  const grid = document.getElementById('calGrid');
  grid.innerHTML = '';

  const firstDay = new Date(viewYear, viewMonth, 1).getDay();
  const daysInMonth = new Date(viewYear, viewMonth + 1, 0).getDate();

  let totalCount = 0, totalDue = 0, totalPaid = 0;

  for(let i=0; i<firstDay; i++){
    grid.insertAdjacentHTML('beforeend', `<div class="day empty"></div>`);
  }

  for(let d=1; d<=daysInMonth; d++){
    const key = dayKey(viewYear, viewMonth, d);
    const bills = billsData[key] || [];
    const isToday = viewYear===today.getFullYear() && viewMonth===today.getMonth() && d===today.getDate();

    let dayTotal = 0;
    bills.forEach(b => {
      totalCount++;
      const amt = parseFloat(b.amount) || 0;
      dayTotal += amt;
      if(b.paid){ totalPaid += amt; } else { totalDue += amt; }
    });

    const amtLabel = dayTotal > 0 ? `<div class="day-amt">$${dayTotal.toFixed(0)}</div>` : '';

    const maxShow = 3;
    let namesHtml = '';
    if(bills.length){
      namesHtml = '<div class="bill-names">';
      bills.slice(0, maxShow).forEach(b => {
        namesHtml += `<div class="bill-name-tag ${b.paid ? 'paid':''}"><span class="dot ${b.paid ? 'paid':''}"></span>${escapeHtml(b.name)}</div>`;
      });
      if(bills.length > maxShow){
        namesHtml += `<div class="bill-more">+${bills.length - maxShow} más</div>`;
      }
      namesHtml += '</div>';
    }

    grid.insertAdjacentHTML('beforeend', `
      <div class="day ${isToday ? 'today':''} ${bills.length ? 'has-bills':''}" data-key="${key}" data-day="${d}">
        <div class="num">${d}</div>
        ${amtLabel}
        ${namesHtml}
      </div>
    `);
  }

  document.getElementById('totalCount').textContent = totalCount;
  document.getElementById('totalDue').textContent = '$' + totalDue.toFixed(2);
  document.getElementById('totalPaid').textContent = '$' + totalPaid.toFixed(2);

  document.querySelectorAll('.day[data-key]').forEach(el => {
    el.addEventListener('click', () => openModal(el.dataset.key, parseInt(el.dataset.day)));
  });
}

function escapeHtml(str){
  const div = document.createElement('div');
  div.textContent = str;
  return div.innerHTML;
}

function openModal(key, day){
  selectedKey = key;
  document.getElementById('modalDate').textContent = `${day} de ${monthNames[viewMonth]}`;
  document.getElementById('modalYear').textContent = viewYear;
  renderBillList();
  document.getElementById('billName').value = '';
  document.getElementById('billAmt').value = '';
  document.getElementById('overlay').classList.add('open');
  setTimeout(() => document.getElementById('billName').focus(), 50);
}

function closeModal(){
  document.getElementById('overlay').classList.remove('open');
  selectedKey = null;
}

function renderBillList(){
  const bills = billsData[selectedKey] || [];
  const listEl = document.getElementById('billList');
  if(bills.length === 0){
    listEl.innerHTML = `<div class="empty-msg">No hay billes en este día todavía.</div>`;
    return;
  }
  listEl.innerHTML = bills.map(b => `
    <div class="bill-row">
      <div class="check ${b.paid ? 'checked':''}" data-id="${b.id}">${b.paid ? '✓':''}</div>
      <div class="info">
        <div class="name ${b.paid ? 'paid':''}">${escapeHtml(b.name)}</div>
        ${b.amount ? `<div class="amt">$${parseFloat(b.amount).toFixed(2)}</div>` : ''}
      </div>
      <button class="del" data-id="${b.id}">✕</button>
    </div>
  `).join('');

  listEl.querySelectorAll('.check').forEach(cb => {
    cb.addEventListener('click', () => {
      const bill = (billsData[selectedKey]||[]).find(b => b.id === cb.dataset.id);
      if(bill){ bill.paid = !bill.paid; saveData(); renderBillList(); render(); }
    });
  });
  listEl.querySelectorAll('.del').forEach(btn => {
    btn.addEventListener('click', () => {
      billsData[selectedKey] = (billsData[selectedKey]||[]).filter(b => b.id !== btn.dataset.id);
      if(billsData[selectedKey].length === 0) delete billsData[selectedKey];
      saveData(); renderBillList(); render();
    });
  });
}

function addBill(){
  const nameInput = document.getElementById('billName');
  const amtInput = document.getElementById('billAmt');
  const name = nameInput.value.trim();
  if(!name) { nameInput.focus(); return; }
  const amount = amtInput.value.trim();

  if(!billsData[selectedKey]) billsData[selectedKey] = [];
  billsData[selectedKey].push({
    id: Date.now().toString(36) + Math.random().toString(36).slice(2,6),
    name,
    amount: amount || '',
    paid: false
  });
  saveData();
  nameInput.value = '';
  amtInput.value = '';
  nameInput.focus();
  renderBillList();
  render();
}

document.getElementById('prevBtn').addEventListener('click', () => {
  viewMonth--; if(viewMonth<0){viewMonth=11; viewYear--;}
  render();
});
document.getElementById('nextBtn').addEventListener('click', () => {
  viewMonth++; if(viewMonth>11){viewMonth=0; viewYear++;}
  render();
});
document.getElementById('closeBtn').addEventListener('click', closeModal);
document.getElementById('overlay').addEventListener('click', (e) => {
  if(e.target.id === 'overlay') closeModal();
});
document.getElementById('addBtn').addEventListener('click', addBill);
document.getElementById('billAmt').addEventListener('keydown', (e) => {
  if(e.key === 'Enter') addBill();
});
document.getElementById('billName').addEventListener('keydown', (e) => {
  if(e.key === 'Enter'){ e.preventDefault(); document.getElementById('billAmt').focus(); }
});

function startApp(displayName){
  currentUserDisplay = displayName;
  currentUserKey = sanitizeKey(displayName);
  document.getElementById('userLabel').textContent = displayName;
  document.getElementById('userOverlay').classList.remove('open');
  loadData();
}

function showUserPrompt(prefill){
  document.getElementById('userOverlay').classList.add('open');
  const input = document.getElementById('userNameInput');
  input.value = prefill || '';
  setTimeout(() => input.focus(), 50);
}

document.getElementById('userNameBtn').addEventListener('click', () => {
  const val = document.getElementById('userNameInput').value.trim();
  if(!val) return;
  localStorage.setItem(USERNAME_LS_KEY, val);
  startApp(val);
});
document.getElementById('userNameInput').addEventListener('keydown', (e) => {
  if(e.key === 'Enter') document.getElementById('userNameBtn').click();
});
document.getElementById('switchUserLink').addEventListener('click', (e) => {
  e.preventDefault();
  showUserPrompt(currentUserDisplay);
});

const savedName = localStorage.getItem(USERNAME_LS_KEY);
if(savedName){
  startApp(savedName);
} else {
  showUserPrompt();
}
</script>
</body>
</html>
